<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PasteRack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <div class="header">
        <div class="logo-dot"></div>
        <span class="logo">PASTERACK</span>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="history">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align: -1px; margin-right: 4px;">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          History
        </button>
        <button class="tab" data-tab="passwords">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align: -1px; margin-right: 4px;">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Vault
        </button>
      </div>

      <!-- History Tab -->
      <div class="tab-content active" id="tab-history">
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            placeholder="Search clips..."
            spellcheck="false"
          />
        </div>
        <div class="list" id="clips-list">
          <div class="empty-state" id="clips-empty">
            <div class="empty-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1"/>
              </svg>
            </div>
            <p>No clips yet</p>
            <p class="hint">Copy something to get started</p>
          </div>
        </div>
        <div class="footer">
          <button class="btn-clear" id="btn-clear-clips">Clear All</button>
          <span class="count" id="clips-count">0 items</span>
        </div>
      </div>

      <!-- Passwords Tab -->
      <div class="tab-content" id="tab-passwords">
        <!-- Vault Lock Screen -->
        <div class="vault-lock" id="vault-lock">
          <div class="vault-lock-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <p class="vault-lock-title" id="vault-lock-title">Create Master Password</p>
          <p class="vault-lock-hint" id="vault-lock-hint">This encrypts all your passwords with AES-256</p>
          <div class="vault-lock-form">
            <input
              type="password"
              id="master-pw-input"
              placeholder="Master password"
              spellcheck="false"
            />
            <input
              type="password"
              id="master-pw-confirm"
              placeholder="Confirm password"
              spellcheck="false"
            />
            <button class="btn-add" id="btn-vault-submit">Unlock Vault</button>
          </div>
          <p class="vault-lock-error" id="vault-lock-error"></p>
        </div>

        <!-- Vault Content (hidden when locked) -->
        <div class="vault-content" id="vault-content" style="display:none;">
        <div class="vault-header">
          <span class="vault-status">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="var(--success)" stroke="none">
              <circle cx="12" cy="12" r="10"/>
            </svg>
            AES-256 Encrypted
          </span>
          <button class="btn-lock" id="btn-lock-vault" title="Lock vault">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Lock
          </button>
        </div>
        <div class="password-form" id="password-form">
          <input
            type="text"
            id="pw-label"
            placeholder="Label (e.g. GitHub Token)"
            spellcheck="false"
          />
          <input
            type="password"
            id="pw-value"
            placeholder="Password or secret"
          />
          <button class="btn-add" id="btn-add-pw">+ Add to Vault</button>
        </div>
        <div class="list" id="passwords-list">
          <div class="empty-state" id="passwords-empty">
            <div class="empty-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <p>No passwords stored</p>
            <p class="hint">Add a password above to get started</p>
          </div>
        </div>
        <div class="footer">
          <span class="count" id="passwords-count">0 passwords</span>
        </div>
        </div><!-- /vault-content -->
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
